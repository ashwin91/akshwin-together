<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 200" role="img" aria-labelledby="title desc">
  <title id="title">Brass temple bell</title>
  <desc id="desc">A hanging brass temple bell on a cord.</desc>
  <defs>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E4C474"/>
      <stop offset=".45" stop-color="#B98A38"/>
      <stop offset="1" stop-color="#7A5A1E"/>
    </linearGradient>
    <linearGradient id="brassShine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F2DD9E"/>
      <stop offset=".5" stop-color="#E4C474"/>
      <stop offset="1" stop-color="#9d6f27"/>
    </linearGradient>
  </defs>
  <!-- cord -->
  <path d="M60 0 V44" fill="none" stroke="#6E7B57" stroke-width="4" stroke-linecap="round"/>
  <!-- crown loop -->
  <circle cx="60" cy="48" r="9" fill="none" stroke="url(#brass)" stroke-width="6"/>
  <!-- bell body -->
  <path d="M60 58
           C 40 58, 30 78, 26 118
           C 23 142, 16 150, 14 158
           L 106 158
           C 104 150, 97 142, 94 118
           C 90 78, 80 58, 60 58 Z"
        fill="url(#brass)" stroke="#7A5A1E" stroke-width="2"/>
  <!-- vertical shine -->
  <path d="M52 64 C 44 84, 40 120, 36 156 L 46 156 C 49 120, 53 86, 60 66 Z"
        fill="url(#brassShine)" opacity=".55"/>
  <!-- rim -->
  <rect x="12" y="156" width="96" height="12" rx="6" fill="url(#brassShine)" stroke="#7A5A1E" stroke-width="2"/>
  <!-- clapper -->
  <circle cx="60" cy="178" r="11" fill="url(#brass)" stroke="#7A5A1E" stroke-width="2"/>
</svg>
